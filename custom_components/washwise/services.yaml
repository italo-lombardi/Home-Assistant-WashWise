mark_washed:
  name: Mark as washed
  description: Record that the surface was just washed. Appends an entry to the wash log.
  fields:
    entry_id:
      name: Configuration
      description: WashWise configuration entry to update.
      required: true
      selector:
        config_entry:
          integration: washwise
    timestamp:
      name: Timestamp
      description: Optional timestamp for the wash event. Defaults to now.
      required: false
      example: "2026-06-11T10:30:00+00:00"
      selector:
        datetime:

snooze:
  name: Snooze
  description: Pause the wash advisor for a number of hours.
  fields:
    entry_id:
      name: Configuration
      description: WashWise configuration entry to snooze.
      required: true
      selector:
        config_entry:
          integration: washwise
    hours:
      name: Hours
      description: How many hours to snooze (minimum 1). Defaults to 24.
      required: false
      default: 24
      example: 24
      selector:
        number:
          min: 1
          max: 720
          unit_of_measurement: h

clear_snooze:
  name: Clear snooze
  description: Cancel any active snooze and return to the normal verdict.
  fields:
    entry_id:
      name: Configuration
      description: WashWise configuration entry to clear snooze for.
      required: true
      selector:
        config_entry:
          integration: washwise

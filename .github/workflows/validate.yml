name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: "actions/checkout@v7"
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"

  validate-hassfest:
    runs-on: "ubuntu-latest"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: "actions/checkout@v7"
      - name: HASS validation
        uses: "home-assistant/actions/hassfest@master"

  lint:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v7"
      - uses: "actions/setup-python@v6"
        with:
          python-version: "3.14"
      - name: Ruff check
        run: |
          pip install ruff
          ruff check
          ruff format --check

  test:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v7"
      - uses: "actions/setup-python@v6"
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: pip install -r requirements_test.txt
      - name: Run tests
        run: pytest tests/ --tb=short -q --cov-fail-under=100
